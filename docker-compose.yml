version: '3.8'

services:
  instabot2:
    build: .
    container_name: instabot2
    restart: unless-stopped
    environment:
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN}
      - DATABASE_PATH=/app/data/bot.db
      - TEMP_DIR=/app/temp
    volumes:
      - ./data:/app/data
      - ./temp:/app/temp
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
